<!DOCTYPE html>

<head>

    <title>現代感公告欄 - 跑馬燈</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <a href="../index.html" class="back-btn" title="返回首頁">

        <main>
            <div class="marquee-wrapper">
                <div class="marquee-content" id="marqueeText">

                </div>
            </div>
        </main>

        <footer>
            <button id="settingsBtn" class="icon-btn" title="設定公告內容">

        </footer>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <h2>修改公告內容</h2>
                <textarea id="contentInput" placeholder="輸入公告內容..."></textarea>
                <div class="modal-actions">
                    <button id="cancelBtn" class="btn secondary">取消</button>
                    <button id="saveBtn" class="btn primary">儲存並更新</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>

</html>
